name: shipmate gate-refresh
description: Complete the shipmate / gate check on a PR head once every apply check is done (pre-merge applies).
inputs:
  head-sha:
    description: PR head SHA carrying the apply checks and the gate.
    required: true
  github-token:
    description: 'GITHUB_TOKEN with statuses:write (gate) + checks:read (apply-check scan).'
    required: true
outputs:
  verdict: { description: "complete, pending, or no-applies", value: "${{ steps.scan.outputs.verdict }}" }
runs:
  using: composite
  steps:
    - name: Scan apply checks on the head commit
      id: scan
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        HEAD_SHA: ${{ inputs.head-sha }}
      # filter=all: a re-created check name keeps its historical runs; apply-gate
      # groups by name and judges the newest run per name. A duplicate apply
      # check created mid-apply is left pending by apply-cell (it completes only
      # ids snapshotted before its apply began), so the gate correctly stays
      # pending until that duplicate's plan is itself applied.
      run: |
        set -euo pipefail
        [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::head-sha must be a 40-char lowercase hex SHA (got: $HEAD_SHA)"; exit 1; }
        gh api --paginate \
          "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?filter=all&per_page=100" \
          --jq '.check_runs[] | {name, status, conclusion, started_at, id}' \
          | python3 "$GITHUB_ACTION_PATH/../../scripts/apply-gate"
    - name: Complete gate
      if: ${{ steps.scan.outputs.verdict == 'complete' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        set -euo pipefail
        python3 - > gate.json <<'PY'
        import json, os
        # Commit status, not a check-run — see actions/summary for the rationale
        # (check-runs bind to a suite; a commit status is commit-scoped and so
        # survives the multi-suite attribution race).
        body = {"state": "success", "context": "shipmate / gate",
                "description": "all applies complete — nothing left to apply"}
        server, repo, run_id = (os.environ.get(k, "") for k in
                                ("GITHUB_SERVER_URL", "GITHUB_REPOSITORY", "GITHUB_RUN_ID"))
        if server and repo and run_id:
            body["target_url"] = f"{server}/{repo}/actions/runs/{run_id}"
        print(json.dumps(body))
        PY
        gh api "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" --input gate.json >/dev/null
