name: shipmate setup
description: Install pinned Terramate + OpenTofu and enable a shared provider plugin cache.
inputs:
  terramate-version:
    description: Terramate CLI version, e.g. 0.17.1 (pass vars.TERRAMATE_VERSION).
    required: true
  tofu-version:
    description: OpenTofu version, e.g. 1.12.4 (pass vars.TOFU_VERSION).
    required: true
runs:
  using: composite
  steps:
    - name: Install OpenTofu
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      with:
        tofu_version: ${{ inputs.tofu-version }}
        tofu_wrapper: false
    - name: Install Terramate
      uses: terramate-io/terramate-action@b5d1461d435ba454179045ea062bbecb32738913 # v2.0.0
      with:
        version: ${{ inputs.terramate-version }}
    - name: Provider plugin cache
      shell: bash
      run: |
        echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/.tofu-plugin-cache" >> "$GITHUB_ENV"
        mkdir -p "$RUNNER_TEMP/.tofu-plugin-cache"
    - name: Restore plugin cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.TF_PLUGIN_CACHE_DIR }}
        key: tofu-plugins-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: tofu-plugins-${{ runner.os }}-
