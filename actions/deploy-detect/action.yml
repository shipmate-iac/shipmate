name: shipmate deploy-detect
description: Map a merge commit to its PR, find still-pending applies, order them into waves.
inputs:
  base-sha:
    description: Previous main tip for change detection (github.event.before).
    required: true
  github-token:
    description: GITHUB_TOKEN with contents/checks/pull-requests/actions read.
    required: true
outputs:
  envlevel0_waves:
    description: JSON wave0..wave7 map for env-level 0.
    value: "${{ steps.detect.outputs.envlevel0_waves }}"
  envlevel1_waves:
    description: JSON wave0..wave7 map for env-level 1.
    value: "${{ steps.detect.outputs.envlevel1_waves }}"
  envlevel2_waves:
    description: JSON wave0..wave7 map for env-level 2.
    value: "${{ steps.detect.outputs.envlevel2_waves }}"
  envlevel3_waves:
    description: JSON wave0..wave7 map for env-level 3.
    value: "${{ steps.detect.outputs.envlevel3_waves }}"
  envlevel0_empty:
    description: "'true' when env-level 0 has no cell in any wave."
    value: "${{ steps.detect.outputs.envlevel0_empty }}"
  envlevel1_empty:
    description: "'true' when env-level 1 has no cell in any wave."
    value: "${{ steps.detect.outputs.envlevel1_empty }}"
  envlevel2_empty:
    description: "'true' when env-level 2 has no cell in any wave."
    value: "${{ steps.detect.outputs.envlevel2_empty }}"
  envlevel3_empty:
    description: "'true' when env-level 3 has no cell in any wave."
    value: "${{ steps.detect.outputs.envlevel3_empty }}"
  head_sha:
    description: PR head SHA for the merged commit.
    value: "${{ steps.detect.outputs.head_sha }}"
  preview_run_id:
    description: Plan workflow run id holding the reviewed plan artifacts.
    value: "${{ steps.detect.outputs.preview_run_id }}"
runs:
  using: composite
  steps:
    - name: Detect pending applies and order into waves
      id: detect
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SHIPMATE_BASE_SHA: ${{ inputs.base-sha }}
      run: python3 "$GITHUB_ACTION_PATH/../../scripts/deploy-detect"
