name: shipmate deploy-detect
description: Map a merge commit to its PR, find still-pending applies, order them into waves.
inputs:
  base-sha:
    description: Previous main tip for change detection (github.event.before).
    required: true
  github-token:
    description: GITHUB_TOKEN with contents/checks/pull-requests/actions read.
    required: true
outputs:
  wave0:
    description: JSON cell array for wave 0.
    value: ${{ steps.d.outputs.wave0 }}
  wave1:
    description: JSON cell array for wave 1.
    value: ${{ steps.d.outputs.wave1 }}
  wave2:
    description: JSON cell array for wave 2.
    value: ${{ steps.d.outputs.wave2 }}
  wave3:
    description: JSON cell array for wave 3.
    value: ${{ steps.d.outputs.wave3 }}
  wave4:
    description: JSON cell array for wave 4.
    value: ${{ steps.d.outputs.wave4 }}
  wave5:
    description: JSON cell array for wave 5.
    value: ${{ steps.d.outputs.wave5 }}
  wave6:
    description: JSON cell array for wave 6.
    value: ${{ steps.d.outputs.wave6 }}
  wave7:
    description: JSON cell array for wave 7.
    value: ${{ steps.d.outputs.wave7 }}
  head_sha:
    description: PR head SHA for the merged commit.
    value: ${{ steps.d.outputs.head_sha }}
  preview_run_id:
    description: Preview workflow run id holding the reviewed plan artifacts.
    value: ${{ steps.d.outputs.preview_run_id }}
  empty:
    description: "'true' when no wave has any cell."
    value: ${{ steps.d.outputs.empty }}
runs:
  using: composite
  steps:
    - id: d
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SHIPMATE_BASE_SHA: ${{ inputs.base-sha }}
      run: python3 "$GITHUB_ACTION_PATH/../../scripts/deploy-detect"
