name: shipmate plan-cell
description: Plan one stack x env, publish plan text + artifacts, create the pending apply check.
inputs:
  stack:
    description: Stack path, e.g. stacks/app.
    required: true
  stack-name:
    description: Stack display name for the check, e.g. app.
    required: true
  env:
    description: Environment name, e.g. dev-eu.
    required: true
  head-sha:
    description: PR head commit SHA for the apply check.
    required: true
  github-token:
    description: GITHUB_TOKEN with checks:write.
    required: true
  retention-days:
    description: Plan artifact retention (days); caps how long the plan artifact stays downloadable. Empty = the repository default.
    required: false
    default: "7"
  plan-passphrase:
    description: Optional passphrase to encrypt the .otplan artifact at rest. Empty = plaintext (backward compatible).
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Plan
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
      run: |
        set -euo pipefail
        echo "::group::terramate plan: $STACK"
        terramate script run --disable-safeguards=git-out-of-sync --no-recursive -C "$STACK" plan
        echo "::endgroup::"

    - name: Stack slug
      id: ids
      shell: bash
      # Author-controlled $STACK via env (never interpolated) — injection-safe.
      env:
        STACK: ${{ inputs.stack }}
      run: |
        slug=$(printf '%s' "$STACK" | tr / -)
        [[ "$slug" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::stack path produced invalid slug"; exit 1; }
        echo "slug=$slug" >> "$GITHUB_OUTPUT"

    - name: Render + classify plan
      id: plan
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
      run: |
        set -euo pipefail
        tofu -chdir="$STACK" show -no-color stack.otplan > plan.txt
        tofu -chdir="$STACK" show -json stack.otplan > plan.json
        python3 "$GITHUB_ACTION_PATH/../../scripts/plan-classify" plan.json

    - name: Encrypt plan artifact at rest (no-op without a passphrase)
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
        PLAN_PASSPHRASE: ${{ inputs.plan-passphrase }}
      run: |
        set -euo pipefail
        python3 "$GITHUB_ACTION_PATH/../../scripts/plan-crypt" encrypt "$STACK/stack.otplan"

    - name: Step summary (plan text, 64KiB cap)
      shell: bash
      env:
        ENV: ${{ inputs.env }}
        STACK_NAME: ${{ inputs.stack-name }}
      run: |
        {
          echo "## plan / $ENV / $STACK_NAME"
          echo '```'
          head -c 65536 plan.txt
          bytes=$(wc -c < plan.txt)
          echo ''
          echo '```'
          if [ "$bytes" -gt 65536 ]; then
            echo "_Plan truncated at 64 KiB ($bytes bytes total) — full plan in this job's raw log._"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload plan artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: plan.${{ inputs.env }}.${{ steps.ids.outputs.slug }}
        path: |
          ${{ inputs.stack }}/stack.otplan
          fingerprint.txt
        retention-days: ${{ inputs.retention-days }}

    - name: Write cell summary
      shell: bash
      # Build via python from env vars so an author-controlled stack-name/env
      # cannot inject shell or break the JSON.
      env:
        STACK: ${{ inputs.stack }}
        STACK_NAME: ${{ inputs.stack-name }}
        ENV: ${{ inputs.env }}
        ADD: ${{ steps.plan.outputs.add }}
        CHANGE: ${{ steps.plan.outputs.change }}
        DESTROY: ${{ steps.plan.outputs.destroy }}
        CHANGED: ${{ steps.plan.outputs.changed }}
      run: |
        python3 - <<'PY'
        import json, os
        with open("cell.json", "w") as fh:
            json.dump({
                "stack": os.environ["STACK_NAME"],
                "stack_path": os.environ["STACK"],
                "environment": os.environ["ENV"],
                "add": int(os.environ["ADD"]),
                "change": int(os.environ["CHANGE"]),
                "destroy": int(os.environ["DESTROY"]),
                "changed": os.environ["CHANGED"] == "true",
            }, fh)
        PY

    - name: Upload cell summary
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: cell-summary.${{ inputs.env }}.${{ steps.ids.outputs.slug }}
        path: |
          cell.json
          plan.txt
        retention-days: ${{ inputs.retention-days }}

    - name: Create apply check (pending / no-changes)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ENV: ${{ inputs.env }}
        STACK: ${{ inputs.stack }}
        HEAD_SHA: ${{ inputs.head-sha }}
        CHANGED: ${{ steps.plan.outputs.changed }}
      run: |
        set -euo pipefail
        # gh api does NOT support -f bracket-nesting (output[title]=...); it would
        # POST a flat literal key. Build the JSON body with python and pipe it in.
        # Author-controlled values pass via env, never interpolated into the script.
        # Check name uses the stack PATH ($STACK) so deploy-detect (which only
        # has the path) can reconstruct it exactly, independent of stack-name.
        name="apply / $ENV / $STACK"
        fp="$(cat fingerprint.txt)"
        if [ "$CHANGED" = "true" ]; then
          status="queued"; conclusion=""; title="apply pending"
          summary="Waiting to be applied. Merge after apply completes for this stack x environment."
        else
          status="completed"; conclusion="neutral"; title="no changes"
          summary="Plan produced no changes for this stack x environment."
        fi
        python3 - "$name" "$HEAD_SHA" "$status" "$conclusion" "$fp" "$title" "$summary" > body.json <<'PY'
        import json, sys
        name, head, status, conclusion, fp, title, summary = sys.argv[1:8]
        body = {"name": name, "head_sha": head, "status": status,
                "external_id": fp, "output": {"title": title, "summary": summary}}
        if conclusion:
            body["conclusion"] = conclusion
        print(json.dumps(body))
        PY
        gh api "repos/$GITHUB_REPOSITORY/check-runs" --input body.json >/dev/null
