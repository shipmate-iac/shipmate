name: shipmate drift-cell
description: Plan one stack x env; open/update a drift Issue on changes, auto-close it when clean.
inputs:
  stack:
    description: Stack path, e.g. stacks/app.
    required: true
  stack-name:
    description: Stack display name for the issue, e.g. app.
    required: true
  env:
    description: Environment name, e.g. dev-eu.
    required: true
  state-path:
    description: Flavor state path, e.g. stacks/app/.state.
    required: true
  github-token:
    description: GITHUB_TOKEN with issues:write.
    required: true
  slack-webhook:
    description: Optional Slack webhook URL; drift is posted when set.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Stack slug
      id: ids
      shell: bash
      # Author-controlled $STACK via env (never interpolated) — injection-safe.
      env:
        STACK: ${{ inputs.stack }}
      run: |
        slug=$(printf '%s' "$STACK" | tr / -)
        [[ "$slug" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "::error::stack path produced invalid slug"; exit 1; }
        echo "slug=$slug" >> "$GITHUB_OUTPUT"

    - name: Restore state
      uses: ship-iac/shipmate/actions/state@fe5839319aa2fcec472e6f68d97ca8a603e54ba5 # pinned to a commit on main
      with:
        stack-slug: ${{ steps.ids.outputs.slug }}
        env: ${{ inputs.env }}
        mode: restore
        path: ${{ inputs.state-path }}

    - name: Plan + classify drift
      id: plan
      shell: bash
      env:
        STACK: ${{ inputs.stack }}
      run: |
        set -euo pipefail
        echo "::group::terramate plan: $STACK"
        terramate script run --disable-safeguards=git-out-of-sync --no-recursive -C "$STACK" plan
        echo "::endgroup::"
        tofu -chdir="$STACK" show -json stack.otplan > plan.json
        python3 "$GITHUB_ACTION_PATH/../../scripts/plan-classify" plan.json

    - name: Upsert / close drift issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ENV: ${{ inputs.env }}
        STACK_NAME: ${{ inputs.stack-name }}
        DRIFTED: ${{ steps.plan.outputs.changed }}
        ADD: ${{ steps.plan.outputs.add }}
        CHANGE: ${{ steps.plan.outputs.change }}
        DESTROY: ${{ steps.plan.outputs.destroy }}
      run: |
        set -euo pipefail
        title="drift: $ENV / $STACK_NAME"
        # gh filters natively via --jq (same idiom as actions/summary) — no extra process.
        # --limit caps how many open drift issues we scan for the match; keep it
        # well above the realistic count of simultaneously-drifting stack x envs
        # so an existing issue is never missed (which would open a duplicate).
        existing=$(TITLE="$title" gh issue list --label drift --state open --limit 1000 \
          --json number,title --jq 'map(select(.title == env.TITLE)) | .[0].number // empty')
        if [ "$DRIFTED" = "true" ]; then
          body="Drift detected in \`$STACK_NAME\` @ \`$ENV\`: +$ADD ~$CHANGE -$DESTROY. Auto-closed on the next clean drift run."
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body" >/dev/null
          else
            gh label create drift --color FBCA04 --description "shipmate drift" --force >/dev/null 2>&1 || true
            gh issue create --title "$title" --label drift --body "$body" >/dev/null
          fi
        elif [ -n "$existing" ]; then
          gh issue close "$existing" --comment "Drift resolved — clean plan for $ENV / $STACK_NAME." >/dev/null
        fi

    - name: Slack notify on drift (optional)
      if: ${{ inputs.slack-webhook != '' && steps.plan.outputs.changed == 'true' }}
      shell: bash
      env:
        SLACK: ${{ inputs.slack-webhook }}
        ENV: ${{ inputs.env }}
        STACK_NAME: ${{ inputs.stack-name }}
      run: |
        set -euo pipefail
        python3 - > payload.json <<'PY'
        import json, os
        print(json.dumps({"text": f":ocean: drift detected: {os.environ['ENV']} / {os.environ['STACK_NAME']}"}))
        PY
        curl -sS --fail-with-body -X POST -H 'Content-Type: application/json' --data @payload.json "$SLACK" >/dev/null
