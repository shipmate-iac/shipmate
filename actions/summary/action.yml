name: shipmate summary
description: Mint a shipmate App installation token and, as the App, create the pending apply checks, upsert the sticky plan comment, and create/refresh the shipmate / gate check.
inputs:
  pr-number:
    description: Pull request number.
    required: true
  head-sha:
    description: PR head commit SHA.
    required: true
  cells-dir:
    description: Directory holding downloaded cell-summary.*/cell.json.
    required: false
    default: cells
  plan-result:
    description: 'Result of the plan matrix job (needs.plan.result): success|failure|cancelled|skipped.'
    required: true
  detect-result:
    description: 'Result of the detect job (needs.detect.result): success|failure|cancelled|skipped.'
    required: true
  app-id:
    description: shipmate App id (a repo/org variable, not a secret).
    required: true
  private-key:
    description: shipmate App private key (from a repo/org secret).
    required: true
runs:
  using: composite
  steps:
    - name: Mint App installation token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ github.event.repository.name }}
        permission-checks: write
        permission-statuses: write
        permission-pull-requests: write

    - name: Create apply checks (pending / no-changes)
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        SHIPMATE_HEAD_SHA: ${{ inputs.head-sha }}
        SHIPMATE_CELLS_DIR: ${{ inputs.cells-dir }}
      run: |
        set -euo pipefail
        [[ "$SHIPMATE_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::head-sha must be a 40-char lowercase hex SHA (got: $SHIPMATE_HEAD_SHA)"; exit 1; }
        python3 "$GITHUB_ACTION_PATH/../../scripts/pending-checks" > bodies.jsonl
        while IFS= read -r body; do
          [ -z "$body" ] && continue
          printf '%s' "$body" | gh api "repos/$GITHUB_REPOSITORY/check-runs" --input - >/dev/null
        done < bodies.jsonl

    - name: Build comment + gate state
      id: build
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        CELLS: ${{ inputs.cells-dir }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        set -euo pipefail
        [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::head-sha must be a 40-char lowercase hex SHA (got: $HEAD_SHA)"; exit 1; }
        # filter=all + latest-run-per-name (apply-gate.latest_by_name): the
        # same check-runs read discipline as gate-refresh / the detects.
        # summary-comment resolves each cell's plan-check link from this list
        # and writes comment.md + pending/count to GITHUB_OUTPUT. A transient
        # listing failure must not block creation of the shipmate / gate
        # check over what only feeds cosmetic links — degrade to an empty
        # listing (summary-comment already falls back to the workflow-run URL
        # when a check can't be resolved) instead of failing the step.
        if ! gh api --paginate \
          "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?filter=all&per_page=100" \
          --jq '.check_runs[] | {name, html_url, id}' > check-runs.jsonl; then
          echo "::warning::check-runs listing failed; comment links degrade to the workflow-run URL"
          : > check-runs.jsonl
        fi
        python3 "$GITHUB_ACTION_PATH/../../scripts/summary-comment" < check-runs.jsonl

    - name: Upsert sticky comment
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        PR: ${{ inputs.pr-number }}
      run: |
        set -euo pipefail
        marker='<!-- shipmate:summary -->'
        # --paginate evaluates --jq per page, so a marker match on >1 page emits
        # multiple ids; head -n1 keeps the single id the PATCH URL needs.
        # Match the marker plus any Bot author, not a hardcoded login: the
        # App's bot login is derived from the registered App name, which a
        # consumer org may have had to slug differently than "shipmate[bot]".
        id=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
               --jq "map(select((.body | contains(\"$marker\")) and .user.type == \"Bot\")) | .[0].id // empty" | head -n1)
        if [ -n "$id" ]; then
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$id" -F body=@comment.md >/dev/null
        else
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -F body=@comment.md >/dev/null
        fi

    - name: Create/refresh gate
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        HEAD_SHA: ${{ inputs.head-sha }}
        PLAN_RESULT: ${{ inputs.plan-result }}
        DETECT_RESULT: ${{ inputs.detect-result }}
        PENDING: ${{ steps.build.outputs.pending }}
        CELL_COUNT: ${{ steps.build.outputs.count }}
      run: |
        set -euo pipefail
        # The gate is a commit STATUS, not a check-run. A check-run is bound to a
        # check-suite; an imperatively-created one lands in an arbitrary suite
        # when a commit carries more than one plan run (draft->ready, or a rapid
        # re-push, spawns two runs = two suites). The merge evaluator then reads
        # the live suite, finds no gate there, and blocks the PR forever while
        # the green gate sits in the stale suite. A commit status is
        # commit-scoped, so it is immune to that attribution race. Written
        # with the App's installation token (statuses:write) alongside the
        # App-authored checks and sticky comment above — one minted token
        # covers all three writes for this job.
        # gh api has no -f bracket-nesting; build the JSON body with python.
        # Gate soundness: read the upstream job results, not just the cell artifacts.
        pr="$PLAN_RESULT"; dr="$DETECT_RESULT"
        if [ "$dr" != "success" ] || { [ "$pr" != "success" ] && [ "$pr" != "skipped" ]; }; then
          state="failure"; desc="plan incomplete (detect=$dr, plan=$pr) — fix the failing <stack> / <env> plan check before merging"
        elif [ "$pr" = "success" ] && [ "$CELL_COUNT" = "0" ]; then
          # Plan jobs ran (matrix was non-empty) but no cell summaries arrived —
          # an artifact-download failure must not resolve the gate green.
          state="failure"; desc="plan jobs ran but produced no cell summaries (artifact download issue) — re-run before merging"
        elif [ "$PENDING" = "true" ]; then
          state="pending"; desc="one or more stacks are waiting to be applied — merge is blocked until applies complete"
        else
          state="success"; desc="no pending applies for this PR"
        fi
        python3 - "$state" "$desc" > gate.json <<'PY'
        import json, os, sys
        state, desc = sys.argv[1:3]
        body = {"state": state, "context": "shipmate / gate", "description": desc[:140]}
        server, repo, run_id = (os.environ.get(k, "") for k in
                                ("GITHUB_SERVER_URL", "GITHUB_REPOSITORY", "GITHUB_RUN_ID"))
        if server and repo and run_id:
            body["target_url"] = f"{server}/{repo}/actions/runs/{run_id}"
        print(json.dumps(body))
        PY
        gh api "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" --input gate.json >/dev/null
