name: shipmate apply-detect
description: Compute the single-env apply work set (from a plan run's plan artifacts) and wave-order it. Skips already-applied cells.
inputs:
  environment:
    description: Target environment, e.g. dev-eu.
    required: true
  plan-run-id:
    description: Plan run id holding the reviewed plan artifacts.
    required: true
  head-sha:
    description: PR head SHA carrying the pending apply checks.
    required: true
  github-token:
    description: 'GITHUB_TOKEN with actions:read, checks:read, contents:read.'
    required: true
outputs:
  wave0: { description: Wave 0 cells (JSON), value: "${{ steps.d.outputs.wave0 }}" }
  wave1: { description: Wave 1 cells (JSON), value: "${{ steps.d.outputs.wave1 }}" }
  wave2: { description: Wave 2 cells (JSON), value: "${{ steps.d.outputs.wave2 }}" }
  wave3: { description: Wave 3 cells (JSON), value: "${{ steps.d.outputs.wave3 }}" }
  wave4: { description: Wave 4 cells (JSON), value: "${{ steps.d.outputs.wave4 }}" }
  wave5: { description: Wave 5 cells (JSON), value: "${{ steps.d.outputs.wave5 }}" }
  wave6: { description: Wave 6 cells (JSON), value: "${{ steps.d.outputs.wave6 }}" }
  wave7: { description: Wave 7 cells (JSON), value: "${{ steps.d.outputs.wave7 }}" }
  waves: { description: "All waves as one JSON object {wave0..wave7} (apply-env-level.yml waves_json shape)", value: "${{ steps.d.outputs.waves }}" }
  empty: { description: true when no cell is pending, value: "${{ steps.d.outputs.empty }}" }
  head_sha: { description: Echoed head SHA, value: "${{ steps.d.outputs.head_sha }}" }
  preview_run_id: { description: Echoed plan run id, value: "${{ steps.d.outputs.preview_run_id }}" }
runs:
  using: composite
  steps:
    - name: Detect
      id: d
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SHIPMATE_ENV: ${{ inputs.environment }}
        SHIPMATE_PLAN_RUN_ID: ${{ inputs.plan-run-id }}
        SHIPMATE_HEAD_SHA: ${{ inputs.head-sha }}
      run: python3 "$GITHUB_ACTION_PATH/../../scripts/apply-detect"
