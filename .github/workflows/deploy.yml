name: deploy
on:
  workflow_call:
    inputs:
      # The flavor's state filename suffix under actions/state (e.g. `.state`,
      # `terraform.tfstate`, `terraform.tfstate.d`).
      state_suffix: { required: true, type: string }
    secrets:
      # Declared for documentation; consumers pass `secrets: inherit`. `vars`
      # (TERRAMATE_VERSION, TOFU_VERSION, SLACK_WEBHOOK) are inherited by a
      # called workflow automatically; secrets are NOT — without inherit the
      # env-level applies of an encrypting consumer would all fail their
      # decrypt fail-safe.
      SHIPMATE_PLAN_PASSPHRASE: { required: false }
      # Feeds the summary job's gate-refresh + Complete-gate App-token mints.
      # Consumers pass `secrets: inherit`; an empty key fails loud at mint.
      SHIPMATE_APP_PRIVATE_KEY: { required: false }
jobs:
  detect:
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: read, actions: read, pull-requests: read }
    outputs:
      envlevel0_waves: ${{ steps.d.outputs.envlevel0_waves }}
      envlevel1_waves: ${{ steps.d.outputs.envlevel1_waves }}
      envlevel2_waves: ${{ steps.d.outputs.envlevel2_waves }}
      envlevel3_waves: ${{ steps.d.outputs.envlevel3_waves }}
      envlevel0_empty: ${{ steps.d.outputs.envlevel0_empty }}
      envlevel1_empty: ${{ steps.d.outputs.envlevel1_empty }}
      envlevel2_empty: ${{ steps.d.outputs.envlevel2_empty }}
      envlevel3_empty: ${{ steps.d.outputs.envlevel3_empty }}
      head_sha: ${{ steps.d.outputs.head_sha }}
      plan_run_id: ${{ steps.d.outputs.plan_run_id }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@cc54ebf89eb763a243a0dc2fc2504ba7dbed5b92
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: d
        uses: ship-iac/shipmate/actions/deploy-detect@cc54ebf89eb763a243a0dc2fc2504ba7dbed5b92
        with:
          # The caller is `on: push` to the default branch; its event payload
          # (and so the previous main tip) is visible here.
          base-sha: ${{ github.event.before }}
          github-token: ${{ github.token }}
          app-id: ${{ vars.SHIPMATE_APP_ID }}

  envlevel0:
    needs: [detect]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel0_empty != 'true' && !contains(join(needs.*.result, ','), 'cancelled') }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@1ddcad409bd388ed437c78522e74cff839c02b20
    permissions: { contents: read, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel0_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      plan_run_id: ${{ needs.detect.outputs.plan_run_id }}
      state_suffix: ${{ inputs.state_suffix }}
    # `inherit`, not an explicit `secrets:` mapping: apply-env-level.yml is pinned
    # by SHA, and in the window before the post-merge pin bump that pinned revision
    # may not yet declare SHIPMATE_PLAN_PASSPHRASE. Passing an undeclared secret via
    # an explicit mapping is a hard load-time error (unlike an undeclared action
    # input, which is silently ignored); `inherit` is not validated against the
    # callee and forwards the optional passphrase when the consumer set it.
    secrets: inherit

  envlevel1:
    needs: [detect, envlevel0]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel1_empty != 'true' && !contains(join(needs.*.result, ','), 'cancelled') }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@1ddcad409bd388ed437c78522e74cff839c02b20
    permissions: { contents: read, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel1_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      plan_run_id: ${{ needs.detect.outputs.plan_run_id }}
      state_suffix: ${{ inputs.state_suffix }}
    secrets: inherit

  envlevel2:
    needs: [detect, envlevel0, envlevel1]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel2_empty != 'true' && !contains(join(needs.*.result, ','), 'cancelled') }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@1ddcad409bd388ed437c78522e74cff839c02b20
    permissions: { contents: read, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel2_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      plan_run_id: ${{ needs.detect.outputs.plan_run_id }}
      state_suffix: ${{ inputs.state_suffix }}
    secrets: inherit

  envlevel3:
    needs: [detect, envlevel0, envlevel1, envlevel2]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel3_empty != 'true' && !contains(join(needs.*.result, ','), 'cancelled') }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@1ddcad409bd388ed437c78522e74cff839c02b20
    permissions: { contents: read, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel3_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      plan_run_id: ${{ needs.detect.outputs.plan_run_id }}
      state_suffix: ${{ inputs.state_suffix }}
    secrets: inherit

  summary:
    needs: [detect, envlevel0, envlevel1, envlevel2, envlevel3]
    if: always()
    runs-on: ubuntu-latest
    # The gate write goes through a minted App token, not GITHUB_TOKEN.
    permissions: {}
    steps:
      - name: Mint App installation token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SHIPMATE_APP_ID }}
          private-key: ${{ secrets.SHIPMATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-statuses: write
      - name: Complete gate on the merged PR head SHA
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          HEAD_SHA: ${{ needs.detect.outputs.head_sha }}
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          # detect failed -> no head SHA -> do not post a (green) gate; fail loud instead.
          if [ -z "$HEAD_SHA" ]; then
            echo "::error::detect produced no head SHA; deploy cannot gate"; exit 1
          fi
          # Any env-level result other than success/skipped (failure, cancelled,
          # timed_out, ...) blocks the gate. grep -q failure alone missed cancels.
          if echo "$RESULTS" | tr ',' '\n' | grep -qvE '^(success|skipped)$'; then
            concl=failure; title="deploy incomplete";
          else concl=success; title="all env-levels applied"; fi
          python3 - "$concl" "$title" > body.json <<'PY'
          import json, os, sys
          # Commit status, not a check-run (see actions/summary for why).
          concl, title = sys.argv[1:3]
          body = {"state": concl, "context": "shipmate / gate",
                  "description": (title + " — deploy env-level applies completed")[:140]}
          server, repo, run_id = (os.environ.get(k, "") for k in
                                  ("GITHUB_SERVER_URL", "GITHUB_REPOSITORY", "GITHUB_RUN_ID"))
          if server and repo and run_id:
              body["target_url"] = f"{server}/{repo}/actions/runs/{run_id}"
          print(json.dumps(body))
          PY
          gh api "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" --input body.json >/dev/null
      - name: Slack on failed deploy (outranks drift)
        if: ${{ always() && (contains(join(needs.*.result, ','), 'failure') || contains(join(needs.*.result, ','), 'cancelled')) && vars.SLACK_WEBHOOK != '' }}
        env:
          SLACK: ${{ vars.SLACK_WEBHOOK }}
        run: |
          set -euo pipefail
          python3 -c "import json;open('p.json','w').write(json.dumps({'text':':rotating_light: shipmate deploy failed on main — a wave apply failed or was cancelled.'}))"
          curl -sS -X POST -H 'Content-Type: application/json' --data @p.json "$SLACK" >/dev/null
