name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # Full history so test_internal_pins can diff the internally-pinned action
        # SHAs against HEAD (a shallow clone lacks those commit objects).
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Lint the workflow files (and shellcheck their run: blocks). actionlint
      # only covers .github/workflows/, not composite actions/*/action.yml.
      # Download script pinned at the release tag; it verifies the binary checksum.
      - name: actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - name: Ruff lint (incl. flake8-bandit S rules)
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Unit tests
        run: uv run pytest scripts/tests -q

      # ty is still beta; surface type findings without gating CI on them.
      - name: Type check (ty, beta)
        run: uv run ty check
        continue-on-error: true
