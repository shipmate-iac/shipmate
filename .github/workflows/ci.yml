name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      # Lint the workflow files (and shellcheck their run: blocks). actionlint
      # only covers .github/workflows/, not composite actions/*/action.yml.
      # Download script pinned at the release tag; it verifies the binary checksum.
      - name: actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

      - name: Ruff lint (incl. flake8-bandit S rules)
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # The internal-pin guard runs in its own workflow (internal-pins.yml) on
      # push to main only — see docs/releasing.md § The guard. Excluded here.
      - name: Unit tests
        run: uv run pytest scripts/tests -q --ignore=scripts/tests/test_internal_pins.py

      # ty is still beta; surface type findings without gating CI on them.
      - name: Type check (ty, beta)
        run: uv run ty check
        continue-on-error: true
