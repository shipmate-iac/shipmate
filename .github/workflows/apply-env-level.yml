name: apply-env-level
on:
  workflow_call:
    inputs:
      waves_json: { required: true, type: string }
      head_sha: { required: true, type: string }
      plan_run_id: { required: true, type: string }
      state_suffix: { required: true, type: string }
    secrets:
      SHIPMATE_PLAN_PASSPHRASE:
        required: false
      SHIPMATE_APP_PRIVATE_KEY:
        required: false
jobs:
  wave0:
    if: ${{ !failure() && !cancelled() && toJSON(fromJSON(inputs.waves_json).wave0) != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.waves_json).wave0 }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    env:
      # Flavor-agnostic: unset vars resolve to "" and are excluded from the
      # fingerprint (empty TF_VAR_* aren't hashed), so folders (no vars) still match their plan.
      TF_VAR_env: ${{ vars.TF_VAR_env }}
      TF_VAR_region: ${{ vars.TF_VAR_region }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0, ref: "${{ inputs.head_sha }}" }
      - uses: ship-iac/shipmate/actions/setup@cc54ebf89eb763a243a0dc2fc2504ba7dbed5b92
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@6e5b150b4220b59273215b4570ef16f93a30ae66
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ inputs.head_sha }}
          plan-run-id: ${{ inputs.plan_run_id }}
          state-path: ${{ matrix.stack }}/${{ inputs.state_suffix }}
          github-token: ${{ github.token }}
          plan-passphrase: ${{ secrets.SHIPMATE_PLAN_PASSPHRASE }}
          app-id: ${{ vars.SHIPMATE_APP_ID }}
          private-key: ${{ secrets.SHIPMATE_APP_PRIVATE_KEY }}
  wave1:
    needs: [wave0]
    if: ${{ !failure() && !cancelled() && !contains(join(needs.*.result, ','), 'cancelled') && toJSON(fromJSON(inputs.waves_json).wave1) != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.waves_json).wave1 }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
